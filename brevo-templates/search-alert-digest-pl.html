<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nowe dopasowania do Twoich wyszukiwań</title>
</head>
<body style="margin:0;padding:0;background-color:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:600px;margin:0 auto;background-color:#ffffff;">
        <tr>
            <td style="padding:32px 24px 16px;text-align:center;">
                <h1 style="margin:0;font-size:24px;color:#1a1a1a;">Nowe dopasowania!</h1>
                <p style="margin:8px 0 0;font-size:16px;color:#666;">{{params.MATCH_COUNT}} nowych ofert pasuje do Twojego wyszukiwania</p>
            </td>
        </tr>
        <tr>
            <td style="padding:16px 24px;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f0f9ff;border-radius:12px;border:1px solid #e0f0fe;">
                    <tr>
                        <td style="padding:20px;">
                            <p style="margin:0 0 4px;font-size:14px;color:#666;">Trasa</p>
                            <p style="margin:0 0 12px;font-size:18px;font-weight:600;color:#1a1a1a;">{{params.ROUTE}}</p>
                            <p style="margin:0 0 4px;font-size:14px;color:#666;">Dopasowania</p>
                            <p style="margin:0;font-size:18px;font-weight:600;color:#0d7377;">{{params.MATCH_COUNT}} nowych ofert</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
        <tr>
            <td style="padding:16px 24px 32px;text-align:center;">
                <a href="https://vamigo.app{{params.DEEP_LINK}}" style="display:inline-block;padding:14px 32px;background-color:#0d7377;color:#ffffff;text-decoration:none;border-radius:24px;font-size:16px;font-weight:600;">Zobacz dopasowania</a>
            </td>
        </tr>
        <tr>
            <td style="padding:16px 24px;border-top:1px solid #eee;text-align:center;">
                <p style="margin:0;font-size:12px;color:#999;">
                    <a href="https://vamigo.app{{params.UNSUBSCRIBE_LINK}}" style="color:#999;text-decoration:underline;">Wypisz się z alertów wyszukiwania</a>
                </p>
            </td>
        </tr>
    </table>
</body>
</html>
