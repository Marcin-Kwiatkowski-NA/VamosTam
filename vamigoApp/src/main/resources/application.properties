spring.config.import=classpath:business-rules.yml
spring.application.name=vamigo
# enable ProblemDetails error messages. Once enabled, Spring reports errors using ProblemDetail:
#spring.mvc.problemdetails.enabled=true
## do not show stacktrace and message in default whitelabel error page
server.error.include-stacktrace=never
server.error.include-message=never
#
## rest client will see body from this page, but not web browser
#server.error.path=/people
#
## disable spring handler, now tomcat will return error page
#server.error.whitelabel.enabled=false
# Datasource configuration
#spring.datasource.url=jdbc:h2:mem:ride_sharing;DB_CLOSE_DELAY=-1;IGNORECASE=TRUE;DATABASE_TO_UPPER=false
# to file database:
#spring.datasource.url=jdbc:h2:file:./data/springdb
#spring.datasource.url=jdbc:h2:file:./data/springdb
#spring.sql.init.mode=always
#
server.port=8080
server.forward-headers-strategy=framework


spring.datasource.url=jdbc:postgresql://akkowocscggkwwocowscw08c:5432/vamos
spring.datasource.username=vamos
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
# H2 configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false
# JPA configuration
# -------Logging--------
# Log levels
#logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=INFO
# Log file location
logging.file.name=${user.home}/logs/blabla2.log
# Log file size and rotation
logging.file.max-size=10MB
logging.file.max-history=30
# Log format (optional)
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p) %clr([%t]){faint} %clr(%-40.40logger{39}){cyan} - %m%n
# Enable SQL logging (prints SQL to console/logs)
spring.jpa.show-sql=false
# Format the SQL for better readability
spring.jpa.properties.hibernate.format_sql=true
# Add comments to SQL statements, often showing the HQL/JPQL that generated them
spring.jpa.properties.hibernate.use_sql_comments=true
# Log SQL statements with DEBUG level (more control, goes through logging framework)
logging.level.org.hibernate.SQL=INFO
# Photon geocoding (OSM)
photon.url=https://ac.vamigo.app

# Spring Cache
spring.cache.type=caffeine
logging.level.root=WARN
#logging.level.org.springframework.web=INFO
logging.level.org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver=DEBUG
logging.level.org.springframework.web.bind=INFO

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile

# JWT Configuration
app.jwt.secret=${JWT_SECRET:your-256-bit-secret-key-for-jwt-signing-must-be-at-least-32-chars}
app.jwt.expiration-ms=1200000
app.jwt.refresh-expiration-ms=604800000

# Google Client IDs for token verification
app.google.web-client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
app.google.android-client-id=${GOOGLE_ANDROID_CLIENT_ID:your-google-android-client-id}

# API Key for external ride scrapers
app.api-key.external-rides=${EXTERNAL_RIDES_API_KEY:dev-api-key-change-in-production}

# Proximity search config moved to business-rules.yml

# Brevo (transactional email) — template IDs in business-rules.yml
brevo.api-key=${BREVO_API_KEY}

# Support & contact email addresses
app.email.support-address=support@vamigo.app
app.email.contact-address=contact@vamigo.app
app.email.sender-address=${APP_EMAIL_SENDER:noreply@vamigo.app}
app.email.sender-name=${APP_EMAIL_SENDER_NAME:Vamigo}

# Email verification
app.email-verification.token-expiry-hours=24
app.email-verification.cooldown-seconds=60
app.email-verification.base-url=${APP_BASE_URL:https://api.vamigo.app}
app.email-verification.frontend-success-url=${VERIFY_SUCCESS_URL:https://vamigo.app/verify-result?status=success}
app.email-verification.frontend-error-url=${VERIFY_ERROR_URL:https://vamigo.app/verify-result?status=error}

# Password reset
app.password-reset.token-expiry-hours=1
app.password-reset.cooldown-seconds=60
app.password-reset.reset-url=${PASSWORD_RESET_URL:https://vamigo.app/reset-password}

spring.threads.virtual.enabled=true

# Firebase (used for FCM push and Facebook token verification)
firebase.enabled=${FIREBASE_ENABLED:true}
firebase.credentials-path=${FIREBASE_CREDENTIALS_PATH:${FCM_CREDENTIALS_PATH:}}

# Push notifications (FCM) — Firebase must be enabled above
fcm.enabled=${FCM_ENABLED:true}

# S3 / Garage storage
spring.cloud.aws.s3.endpoint=https://s3.vamigo.app
spring.cloud.aws.s3.path-style-access-enabled=true
spring.cloud.aws.region.static=garage
spring.cloud.aws.credentials.access-key=${GARAGE_ACCESS_KEY}
spring.cloud.aws.credentials.secret-key=${GARAGE_SECRET_KEY}
spring.cloud.aws.ec2.metadata.enabled=false

# Avatar storage
app.storage.bucket=user-profiles
app.storage.public-url-base=https://storage.vamigo.app
app.storage.avatar-presign-ttl-minutes=5
app.storage.avatar-max-size-bytes=5242880
app.storage.vehicle-photo-presign-ttl-minutes=5
app.storage.vehicle-photo-max-size-bytes=10485760

# External import match notification
app.email.external-import-frontend-url=${EXTERNAL_IMPORT_FRONTEND_URL:https://vamigo.app}

# Map / routing
map.osrm-url=${OSRM_URL:https://router.project-osrm.org}

