# Business logic constants
# Override via environment variables for per-environment tuning.

ride:
  auto-complete-buffer-minutes: ${RIDE_AUTO_COMPLETE_BUFFER_MINUTES:720}
  no-booking-expiry-minutes: ${RIDE_NO_BOOKING_EXPIRY_MINUTES:60}
  completion-check-interval-ms: ${RIDE_COMPLETION_CHECK_INTERVAL_MS:300000}
  min-departure-notice-minutes: ${RIDE_MIN_DEPARTURE_NOTICE_MINUTES:30}

seat:
  expiry-check-interval-ms: ${SEAT_EXPIRY_CHECK_INTERVAL_MS:300000}

booking:
  pending-ttl-minutes: ${BOOKING_PENDING_TTL_MINUTES:60}
  expiry-check-interval-ms: ${BOOKING_EXPIRY_CHECK_INTERVAL_MS:60000}

auth:
  token-cleanup-cron: ${AUTH_TOKEN_CLEANUP_CRON:0 0 3 * * ?}  # daily at 3:00 AM
  rate-limit:
    requests-per-minute: ${AUTH_RATE_LIMIT_RPM:20}
  account-lock:
    max-failed-attempts: ${AUTH_MAX_FAILED_ATTEMPTS:5}
    lock-duration-minutes: ${AUTH_LOCK_DURATION_MINUTES:15}

review:
  reminder-cron: ${REVIEW_REMINDER_CRON:0 0 10 * * ?}  # daily at 10:00 AM
  publish-cron: ${REVIEW_PUBLISH_CRON:0 0 * * * ?}  # every hour at :00
  publish-delay-days: ${REVIEW_PUBLISH_DELAY_DAYS:0}  # change in prod

notification:
  cleanup-cron: ${NOTIFICATION_CLEANUP_CRON:0 0 3 * * ?}  # daily at 3:00 AM
  cleanup-retention-days: ${NOTIFICATION_CLEANUP_RETENTION_DAYS:90}

brevo:
  verification-template-id: ${BREVO_VERIFICATION_TEMPLATE_ID:2}
  verification-template-id-pl: ${BREVO_VERIFICATION_TEMPLATE_ID_PL:1}
  password-reset-template-id: ${BREVO_PASSWORD_RESET_TEMPLATE_ID:5}
  password-reset-template-id-pl: ${BREVO_PASSWORD_RESET_TEMPLATE_ID_PL:3}

search:
  proximity:
    radius-divisor: ${SEARCH_PROXIMITY_RADIUS_DIVISOR:3}
    min-radius-km: ${SEARCH_PROXIMITY_MIN_RADIUS_KM:30}
  smart-match:
    radius-km: ${SEARCH_SMART_MATCH_RADIUS_KM:50}
    max-segments: ${SEARCH_SMART_MATCH_MAX_SEGMENTS:5}
    refresh-cooldown-seconds: ${SEARCH_SMART_MATCH_REFRESH_COOLDOWN_SECONDS:120}
