spring.jpa.hibernate.ddl-auto=create

# API Key for external rides (test value)
app.api-key.external-rides=test-api-key-12345

# JWT Configuration (test values)
app.jwt.secret=test-secret-key-must-be-at-least-32-characters-long
app.jwt.expiration-ms=3600000
app.jwt.refresh-expiration-ms=604800000

# Review publish delay (0 = immediate for testing)
review.publish-delay-days=0

# Brevo (test - no actual emails sent)
brevo.api-key=test-brevo-key

# Email verification (test values)
app.email-verification.token-expiry-hours=24
app.email-verification.cooldown-seconds=60
app.email-verification.base-url=http://localhost:8080
app.email-verification.frontend-success-url=https://localhost:3000/verify-success
app.email-verification.frontend-error-url=https://localhost:3000/verify-error

# Disable Firebase Cloud Messaging in tests
fcm.enabled=false

# Auth brute-force protection (lenient IP limit for tests)
auth.rate-limit.requests-per-minute=1000
auth.account-lock.max-failed-attempts=5
auth.account-lock.lock-duration-minutes=15
