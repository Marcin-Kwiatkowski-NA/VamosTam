spring.jpa.hibernate.ddl-auto=create

# API Key for external rides (test value)
app.api-key.external-rides=test-api-key-12345

# JWT Configuration (test values)
app.jwt.secret=test-secret-key-must-be-at-least-32-characters-long
app.jwt.expiration-ms=3600000
app.jwt.refresh-expiration-ms=604800000

# Brevo (test - no actual emails sent)
brevo.api-key=test-brevo-key

# Email verification (test values)
app.email-verification.token-expiry-hours=24
app.email-verification.cooldown-seconds=60
app.email-verification.base-url=http://localhost:8080
app.email-verification.frontend-success-url=https://localhost:3000/verify-success
app.email-verification.frontend-error-url=https://localhost:3000/verify-error

# Disable Firebase in tests — tests that need FirebaseAuth must provide a mock bean.
firebase.enabled=false
fcm.enabled=false

# Auth brute-force protection (lenient IP limit for tests)
auth.rate-limit.requests-per-minute=1000
auth.account-lock.max-failed-attempts=5
auth.account-lock.lock-duration-minutes=15

# ===== Integration test acceleration =====
# Photon stubbed by a static WireMockServer on a fixed test port (see AbstractFullStackTest)
photon.url=http://localhost:19089

# Booking expiry - expire PENDING bookings immediately so scheduler tests finish quickly
booking.pending-ttl-minutes=0
booking.expiry-check-interval-ms=500

# Ride completion/expiry - no buffer so scheduler fires the same second
ride.completion-check-interval-ms=500
ride.auto-complete-buffer-minutes=0
ride.no-booking-expiry-minutes=0

# Review publication - every second (Spring 6-field cron: sec min hour day month day-of-week)
review.publish-cron=*/1 * * * * *
review.publish-delay-days=0
